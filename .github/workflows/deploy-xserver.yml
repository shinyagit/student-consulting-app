name: Deploy to Xserver Rental Server

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: xserver-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, intl, pdo_mysql
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install PHP dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Build frontend assets
        run: |
          npm ci
          npm run build

      # --- 修正ポイント1: ssh-agent アクションを使用して鍵をグローバルに有効化 ---
      - name: Install SSH Key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.XSERVER_SSH_KEY }}

      # --- 修正ポイント2: known_hosts の設定のみを行う ---
      - name: Setup known_hosts
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Upload Laravel app
        shell: bash
        run: |
          rsync -az --delete \
            --exclude ".git" \
            --exclude ".github" \
            --exclude "node_modules" \
            --exclude ".env" \
            --exclude "storage" \
            -e "ssh -p ${{ secrets.XSERVER_PORT }}" \
            ./ "${{ secrets.XSERVER_USER }}@${{ secrets.XSERVER_HOST }}:${{ secrets.XSERVER_DEPLOY_PATH }}/current/"

      - name: Finalize deploy on server
        shell: bash
        env:
          APP_ENV_FILE: ${{ secrets.APP_ENV_FILE }}
        run: |
          ssh -p "${{ secrets.XSERVER_PORT }}" "${{ secrets.XSERVER_USER }}@${{ secrets.XSERVER_HOST }}" "
            set -e
            cd '${{ secrets.XSERVER_DEPLOY_PATH }}'

            mkdir -p shared/storage/logs
            mkdir -p shared/storage/framework
            mkdir -p shared/storage/app/public
            mkdir -p current

            if [ ! -f shared/.env ]; then
              printf '%s\n' \"$APP_ENV_FILE\" > shared/.env
            fi

            # シンボリックリンク作成時は絶対パスを確実に指定
            DEPLOY_PATH='${{ secrets.XSERVER_DEPLOY_PATH }}'
            ln -sfn \"\$DEPLOY_PATH/shared/.env\" \"\$DEPLOY_PATH/current/.env\"
            rm -rf \"\$DEPLOY_PATH/current/storage\"
            ln -sfn \"\$DEPLOY_PATH/shared/storage\" \"\$DEPLOY_PATH/current/storage\"

            cd current
            php artisan config:clear
            php artisan route:clear
            php artisan view:clear
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
          "

      - name: Validate and sync public directory
        shell: bash
        run: |
          ssh -p "${{ secrets.XSERVER_PORT }}" "${{ secrets.XSERVER_USER }}@${{ secrets.XSERVER_HOST }}" "
            set -e
            TARGET='${{ secrets.XSERVER_PUBLIC_PATH }}'
            PARENT=\$(dirname \"\$TARGET\")

            if [ ! -d \"\$PARENT\" ]; then
              echo 'Parent directory does not exist: '\"\$PARENT\"
              exit 1
            fi

            mkdir -p \"\$TARGET\"
            rsync -az --delete '${{ secrets.XSERVER_DEPLOY_PATH }}/current/public/' \"\$TARGET/\"
          "
