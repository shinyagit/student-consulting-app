name: Deploy to Xserver

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: xserver-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, intl, pdo_mysql
          tools: composer:v2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install PHP dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Build frontend assets
        run: |
          npm ci
          npm run build

      - name: Upload app files to server
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.XSERVER_HOST }}
          username: ${{ secrets.XSERVER_USER }}
          key: ${{ secrets.XSERVER_SSH_KEY }}
          port: ${{ secrets.XSERVER_PORT }}
          source: "./*"
          target: "${{ secrets.XSERVER_DEPLOY_PATH }}/current"
          overwrite: true
          strip_components: 0
          rm: false

      - name: Finalize deploy on server
        uses: appleboy/ssh-action@master
        env:
          APP_ENV_FILE: ${{ secrets.APP_ENV_FILE }}
        with:
          host: ${{ secrets.XSERVER_HOST }}
          username: ${{ secrets.XSERVER_USER }}
          key: ${{ secrets.XSERVER_SSH_KEY }}
          port: ${{ secrets.XSERVER_PORT }}
          envs: APP_ENV_FILE
          script: |
            set -e

            cd "${{ secrets.XSERVER_DEPLOY_PATH }}"

            mkdir -p shared
            mkdir -p shared/storage
            mkdir -p shared/storage/logs
            mkdir -p shared/storage/framework
            mkdir -p shared/storage/framework/cache
            mkdir -p shared/storage/framework/sessions
            mkdir -p shared/storage/framework/views
            mkdir -p shared/storage/app
            mkdir -p shared/storage/app/public
            mkdir -p current

            printf '%s\n' "$APP_ENV_FILE" > shared/.env

            rm -f current/.env
            ln -sfn "$(pwd)/shared/.env" current/.env

            rm -rf current/storage
            ln -sfn "$(pwd)/shared/storage" current/storage

            cd current

            rm -rf .git .github node_modules tests docker

            php artisan config:clear
            php artisan route:clear
            php artisan view:clear
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

      - name: Sync public files to public path
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.XSERVER_HOST }}
          username: ${{ secrets.XSERVER_USER }}
          key: ${{ secrets.XSERVER_SSH_KEY }}
          port: ${{ secrets.XSERVER_PORT }}
          script: |
            set -e

            TARGET="${{ secrets.XSERVER_PUBLIC_PATH }}"
            PARENT="$(dirname "$TARGET")"

            if [ ! -d "$PARENT" ]; then
              echo "Parent directory does not exist: $PARENT"
              exit 1
            fi

            mkdir -p "$TARGET"

            rsync -az --delete \
              "${{ secrets.XSERVER_DEPLOY_PATH }}/current/public/" \
              "$TARGET/"