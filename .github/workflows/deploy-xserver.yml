name: Deploy to Xserver Rental Server

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: xserver-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4  # fix: v5は存在しない

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.0'
          extensions: mbstring, intl, pdo_mysql
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v4  # fix: v6は存在しない
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install PHP dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Build frontend assets
        run: |
          npm ci
          npm run build

      # fix: webfactory/ssh-agent を使うことで SSH_AUTH_SOCK の引き継ぎ問題を解消
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.XSERVER_SSH_KEY }}

      - name: Add known hosts
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      # fix: rsync より前にリモートのディレクトリ構造を作成する
      - name: Prepare remote directories
        run: |
          ssh -p "${{ secrets.XSERVER_PORT }}" "${{ secrets.XSERVER_USER }}@${{ secrets.XSERVER_HOST }}" bash << EOF
            set -e
            mkdir -p "${{ secrets.XSERVER_DEPLOY_PATH }}/current"
            mkdir -p "${{ secrets.XSERVER_DEPLOY_PATH }}/shared/storage/logs"
            mkdir -p "${{ secrets.XSERVER_DEPLOY_PATH }}/shared/storage/framework/cache"
            mkdir -p "${{ secrets.XSERVER_DEPLOY_PATH }}/shared/storage/framework/sessions"
            mkdir -p "${{ secrets.XSERVER_DEPLOY_PATH }}/shared/storage/framework/views"
            mkdir -p "${{ secrets.XSERVER_DEPLOY_PATH }}/shared/storage/app/public"
          EOF

      - name: Upload Laravel app
        run: |
          rsync -az --delete \
            --exclude ".git" \
            --exclude ".github" \
            --exclude "node_modules" \
            --exclude ".env" \
            --exclude "storage" \
            -e "ssh -p ${{ secrets.XSERVER_PORT }}" \
            ./ "${{ secrets.XSERVER_USER }}@${{ secrets.XSERVER_HOST }}:${{ secrets.XSERVER_DEPLOY_PATH }}/current/"

      # fix: SCPでの転送を Finalize より前に実行する
      - name: Upload .env to server
        run: |
          printf '%s' "${{ secrets.APP_ENV_FILE }}" > /tmp/app_env_file
          scp -P "${{ secrets.XSERVER_PORT }}" /tmp/app_env_file \
            "${{ secrets.XSERVER_USER }}@${{ secrets.XSERVER_HOST }}:/tmp/app_env_uploaded"
          rm /tmp/app_env_file

      - name: Finalize deploy on server
        run: |
          ssh -p "${{ secrets.XSERVER_PORT }}" "${{ secrets.XSERVER_USER }}@${{ secrets.XSERVER_HOST }}" bash << EOF
            set -e
            DEPLOY_PATH="${{ secrets.XSERVER_DEPLOY_PATH }}"

            # .envがなければSCPで転送済みのファイルを配置
            if [ ! -f "\$DEPLOY_PATH/shared/.env" ]; then
              cp /tmp/app_env_uploaded "\$DEPLOY_PATH/shared/.env"
              chmod 600 "\$DEPLOY_PATH/shared/.env"
            fi
            rm -f /tmp/app_env_uploaded

            # fix: ダブルクォートで囲み \$(pwd) が正しく展開されるようにする
            DEPLOY_ABS="\$(cd "\$DEPLOY_PATH" && pwd)"

            rm -f "\$DEPLOY_PATH/current/.env"
            ln -sfn "\$DEPLOY_ABS/shared/.env" "\$DEPLOY_PATH/current/.env"

            rm -rf "\$DEPLOY_PATH/current/storage"
            ln -sfn "\$DEPLOY_ABS/shared/storage" "\$DEPLOY_PATH/current/storage"

            cd "\$DEPLOY_PATH/current"

            php artisan config:clear
            php artisan route:clear
            php artisan view:clear
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
          EOF

      - name: Validate and sync public directory
        run: |
          ssh -p "${{ secrets.XSERVER_PORT }}" "${{ secrets.XSERVER_USER }}@${{ secrets.XSERVER_HOST }}" bash << EOF
            set -e
            TARGET="${{ secrets.XSERVER_PUBLIC_PATH }}"
            PARENT="\$(dirname "\$TARGET")"

            if [ ! -d "\$PARENT" ]; then
              echo "Parent directory does not exist: \$PARENT"
              exit 1
            fi

            mkdir -p "\$TARGET"

            rsync -az --delete \
              "${{ secrets.XSERVER_DEPLOY_PATH }}/current/public/" \
              "\$TARGET/"
          EOF