name: Deploy to Xserver Rental Server

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: xserver-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, intl, pdo_mysql
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install PHP dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Build frontend assets
        run: |
          npm ci
          npm run build

      - name: Prepare SSH key and known_hosts
        shell: bash
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          printf '%s' "${{ secrets.XSERVER_SSH_KEY_B64 }}" | base64 --decode > ~/.ssh/xserver_key
          chmod 600 ~/.ssh/xserver_key

          ssh-keyscan -p "${{ secrets.XSERVER_PORT }}" -H "${{ secrets.XSERVER_HOST }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Validate private key format
        shell: bash
        run: |
          head -n 1 ~/.ssh/xserver_key
          tail -n 1 ~/.ssh/xserver_key
          ssh-keygen -y -f ~/.ssh/xserver_key > /dev/null

      - name: Test SSH login
        shell: bash
        run: |
          ssh -i ~/.ssh/xserver_key -p "${{ secrets.XSERVER_PORT }}" "${{ secrets.XSERVER_USER }}@${{ secrets.XSERVER_HOST }}" "echo connected"

      - name: Upload Laravel app
        shell: bash
        run: |
          rsync -az --delete \
            --exclude ".git" \
            --exclude ".github" \
            --exclude "node_modules" \
            --exclude ".env" \
            --exclude "storage" \
            -e "ssh -i ~/.ssh/xserver_key -p ${{ secrets.XSERVER_PORT }}" \
            ./ "${{ secrets.XSERVER_USER }}@${{ secrets.XSERVER_HOST }}:${{ secrets.XSERVER_DEPLOY_PATH }}/current/"

      - name: Finalize deploy on server
        shell: bash
        env:
          APP_ENV_FILE: ${{ secrets.APP_ENV_FILE }}
        run: |
          ssh -i ~/.ssh/xserver_key -p "${{ secrets.XSERVER_PORT }}" "${{ secrets.XSERVER_USER }}@${{ secrets.XSERVER_HOST }}" "
            set -e

            mkdir -p '${{ secrets.XSERVER_DEPLOY_PATH }}'
            cd '${{ secrets.XSERVER_DEPLOY_PATH }}'

            mkdir -p shared
            mkdir -p shared/storage
            mkdir -p shared/storage/logs
            mkdir -p shared/storage/framework
            mkdir -p shared/storage/framework/cache
            mkdir -p shared/storage/framework/sessions
            mkdir -p shared/storage/framework/views
            mkdir -p shared/storage/app
            mkdir -p shared/storage/app/public
            mkdir -p current

            printf '%s\n' \"$APP_ENV_FILE\" > shared/.env

            rm -f current/.env
            ln -sfn '$(pwd)/shared/.env' current/.env

            rm -rf current/storage
            ln -sfn '$(pwd)/shared/storage' current/storage

            cd current

            php artisan config:clear
            php artisan route:clear
            php artisan view:clear
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
          "

      - name: Validate and sync public directory
        shell: bash
        run: |
          ssh -i ~/.ssh/xserver_key -p "${{ secrets.XSERVER_PORT }}" "${{ secrets.XSERVER_USER }}@${{ secrets.XSERVER_HOST }}" "
            set -e

            TARGET='${{ secrets.XSERVER_PUBLIC_PATH }}'
            PARENT=\$(dirname \"\$TARGET\")

            if [ ! -d \"\$PARENT\" ]; then
              echo 'Parent directory does not exist: '"\$PARENT"
              exit 1
            fi

            mkdir -p \"\$TARGET\"

            rsync -az --delete \
              '${{ secrets.XSERVER_DEPLOY_PATH }}/current/public/' \
              \"\$TARGET/\"
          "